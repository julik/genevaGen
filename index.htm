<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Geneva Drive Generator</title>
<style>
body { font-family: sans-serif; margin: 20px; background: #f5f5f5; display: flex; gap: 24px; }
.controls { min-width: 280px; }
.variableDef { margin: 4px 0; display: flex; align-items: center; gap: 6px; }
.variableDef .name { font-weight: bold; font-family: monospace; width: 1.2em; display: inline-block; }
.variableDef .desc { color: #666; font-size: 0.9em; }
.variableDef input[type=number] { width: 70px; }
.variableDef .value { font-family: monospace; }
hr { border: none; border-top: 1px solid #ccc; margin: 10px 0; }
label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
svg { background: #fcfff5; border: 1px solid #999; }
</style>
</head>
<body>

<div class="controls">
  <div class="variableDef">
    <input type="radio" name="primary" value="a" id="ra">
    <label for="ra">
      <span class="name">a</span>
      <span class="desc">drive crank radius</span>
    </label>
    <input type="number" id="a_input" step="0.01" style="display:none">
    <span class="value" id="a_display"></span>
  </div>
  <div class="variableDef">
    <input type="radio" name="primary" value="b" id="rb" checked>
    <label for="rb">
      <span class="name">b</span>
      <span class="desc">Geneva wheel radius</span>
    </label>
    <input type="number" id="b_input" value="3.0" step="0.01">
    <span class="value" id="b_display" style="display:none"></span>
  </div>
  <div class="variableDef">
    <label>
      <span class="name">n</span>
      <span class="desc">number of positions</span>
    </label>
    <input type="number" id="n_input" value="6" step="1" min="2" max="256">
  </div>
  <div class="variableDef">
    <label>
      <span class="name">p</span>
      <span class="desc">pin diameter</span>
    </label>
    <input type="number" id="p_input" value="0.25" step="0.01" min="0.01" max="12.00">
  </div>
  <div class="variableDef">
    <label>
      <span class="name">t</span>
      <span class="desc">allowed clearance</span>
    </label>
    <input type="number" id="t_input" value="0.05" step="0.01" min="0.0" max="10.0">
  </div>

  <hr>

  <div class="variableDef"><span class="name">c</span><span class="desc">center distance</span><span class="value" id="c_val"></span></div>
  <div class="variableDef"><span class="name">s</span><span class="desc">slot center length</span><span class="value" id="s_val"></span></div>
  <div class="variableDef"><span class="name">w</span><span class="desc">slot width</span><span class="value" id="w_val"></span></div>
  <div class="variableDef"><span class="name">y</span><span class="desc">lock disc radius</span><span class="value" id="y_val"></span></div>
  <div class="variableDef"><span class="name">z</span><span class="desc">lock disc radius (with clearance)</span><span class="value" id="z_val"></span></div>
  <div class="variableDef"><span class="name">v</span><span class="desc">clearance arc radius</span><span class="value" id="v_val"></span></div>

  <hr>

  <label><input type="checkbox" id="animateCheck"> Animate</label>
  <label><input type="checkbox" id="dimsCheck"> Show Dimensions</label>
  <div class="variableDef">
    <label>
      <span class="name">v</span>
      <span class="desc">rotation speed (deg/s)</span>
    </label>
    <input type="number" id="speed_input" value="30" step="1" min="-720" max="720">
  </div>
  <button id="copyBtn">Copy SVG</button>
  <button id="copyAnimBtn">Copy Animated SVG</button>
  <span id="copyStatus" style="margin-left:6px;color:#666;font-size:0.9em;"></span>

  <hr>
  <label>Shape CSS</label>
  <textarea id="shapeCss" rows="10" style="width:100%;font-family:monospace;font-size:12px;tab-size:2">.drive_wheel { fill: none; stroke: black; stroke-width: 0.05; }
.lock_disc { fill: none; stroke: black; stroke-width: 0.05; }
.drive_pin { fill: none; stroke: black; stroke-width: 0.05; }
.geneva_wheel { fill: white; stroke: black; stroke-width: 0.05; }
.anchor { fill: none; stroke: none; }</textarea>
</div>

<svg id="genevaDrive" width="500" height="350"></svg>

<script type="application/x-js-template" id="embedTpl">
(function() {
  var C = __CFG__;
  var svg = document.currentScript.previousElementSibling;
  var drive = svg.querySelector('.drive_group');
  var wheel = svg.querySelector('.wheel_group');
  var spin = 0, last = null;
  function tick(now) {
    if (last !== null) spin = (spin + (now - last) * C.dps / 1000) % 360;
    last = now;
    drive.setAttribute('transform', 'rotate(' + spin + ' ' + C.dx + ' ' + C.dy + ')');
    var pr = (C.psd + spin) * Math.PI / 180;
    var px = C.dx + C.a * Math.cos(pr), py = C.dy + C.a * Math.sin(pr);
    var dx = px - C.wx, dy = py - C.wy;
    var wr = (dx * dx + dy * dy <= C.b2) ? Math.atan2(dy, dx) * 180 / Math.PI : C.rest;
    wheel.setAttribute('transform', 'rotate(' + wr + ' ' + C.wx + ' ' + C.wy + ')');
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.18/paper-core.min.js"></script>
<script>
(function() {
  var PI = Math.PI;
  var fmt = function(v) { return v.toFixed(4); };
  var dist = function(x1,y1,x2,y2) { return Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1)); };

  // Paper.js headless — used only for shape generation
  paper.setup(document.createElement('canvas'));

  // DOM refs
  var primaryRadios = document.querySelectorAll('input[name=primary]');
  var aInput = document.getElementById('a_input');
  var bInput = document.getElementById('b_input');
  var aDisplay = document.getElementById('a_display');
  var bDisplay = document.getElementById('b_display');
  var nInput = document.getElementById('n_input');
  var pInput = document.getElementById('p_input');
  var tInput = document.getElementById('t_input');
  var animateCheck = document.getElementById('animateCheck');
  var dimsCheck = document.getElementById('dimsCheck');
  var shapeCss = document.getElementById('shapeCss');
  var svg = document.getElementById('genevaDrive');

  var spinAngle = 0;
  var animFrame = null;
  var lastTime = 0;
  var cachedShapes = null;

  function getPrimary() {
    return document.querySelector('input[name=primary]:checked').value;
  }

  function calc() {
    var primary = getPrimary();
    var n = parseFloat(nInput.value) || 6;
    var p = parseFloat(pInput.value) || 0.25;
    var t = parseFloat(tInput.value) || 0.05;
    var a, b, c;

    if (primary === 'b') {
      b = parseFloat(bInput.value) || 3;
      c = b / Math.cos(PI / n);
      a = Math.sqrt(c * c - b * b);
    } else {
      a = parseFloat(aInput.value) || 1;
      c = a / Math.sin(PI / n);
      b = Math.sqrt(c * c - a * a);
    }

    var s = (a + b) - c;
    var w = p + t;
    var y = a - 1.5 * p;
    var z = y - t;
    var v = (b * z) / a;

    return { a:a, b:b, c:c, n:n, p:p, t:t, s:s, w:w, y:y, z:z, v:v };
  }

  function updateInputVisibility() {
    var primary = getPrimary();
    aInput.style.display = primary === 'a' ? '' : 'none';
    aDisplay.style.display = primary === 'a' ? 'none' : '';
    bInput.style.display = primary === 'b' ? '' : 'none';
    bDisplay.style.display = primary === 'b' ? 'none' : '';
  }

  function updateDisplayValues(P) {
    aDisplay.textContent = fmt(P.a);
    bDisplay.textContent = fmt(P.b);
    document.getElementById('c_val').textContent = fmt(P.c);
    document.getElementById('s_val').textContent = fmt(P.s);
    document.getElementById('w_val').textContent = fmt(P.w);
    document.getElementById('y_val').textContent = fmt(P.y);
    document.getElementById('z_val').textContent = fmt(P.z);
    document.getElementById('v_val').textContent = fmt(P.v);
  }

  // Lock disc path: main disc minus clearance circle, built from true SVG arcs
  function buildLockDiscPath(cx1, cy1, R, cx2, cy2, r) {
    var dx = cx2 - cx1, dy = cy2 - cy1;
    var d = Math.sqrt(dx * dx + dy * dy);
    var aa = (R * R - r * r + d * d) / (2 * d);
    var h = Math.sqrt(R * R - aa * aa);
    var mx = cx1 + aa * dx / d, my = cy1 + aa * dy / d;
    var ix1 = mx + h * dy / d, iy1 = my - h * dx / d;
    var ix2 = mx - h * dy / d, iy2 = my + h * dx / d;
    // Main arc: from ix1 to ix2 passing through the point on main farthest from clearance
    var farX = cx1 - R * dx / d, farY = cy1 - R * dy / d;
    var mf = arcFlags(cx1, cy1, ix1, iy1, ix2, iy2, farX, farY);
    // Clearance arc: from ix2 to ix1 passing through the point on clearance closest to main
    var nearX = cx2 - r * dx / d, nearY = cy2 - r * dy / d;
    var cf = arcFlags(cx2, cy2, ix2, iy2, ix1, iy1, nearX, nearY);
    return 'M' + ix1 + ' ' + iy1 +
      ' A ' + R + ' ' + R + ' 0 ' + mf.large + ' ' + mf.sweep + ' ' + ix2 + ' ' + iy2 +
      ' A ' + r + ' ' + r + ' 0 ' + cf.large + ' ' + cf.sweep + ' ' + ix1 + ' ' + iy1 + ' Z';
  }

  // Pick SVG arc flags so the arc from p1 to p2 on circle (cx,cy,*) passes through a given direction
  function arcFlags(cx, cy, p1x, p1y, p2x, p2y, throughX, throughY) {
    var TWOPI = 2 * PI;
    var norm = function(a) { a = a % TWOPI; return a < 0 ? a + TWOPI : a; };
    var t1 = Math.atan2(p1y - cy, p1x - cx);
    var t2 = Math.atan2(p2y - cy, p2x - cx);
    var tT = Math.atan2(throughY - cy, throughX - cx);
    var cw = norm(t2 - t1);
    var cwT = norm(tT - t1);
    var sweep = (cwT > 0 && cwT < cw) ? 1 : 0;
    var extent = sweep ? cw : TWOPI - cw;
    return { large: extent > PI ? 1 : 0, sweep: sweep };
  }

  // ---- Shape generator (uses Paper.js) ----

  function generateShapes(P) {
    var Pt = paper.Point;
    var wheelX = 0, wheelY = 0;
    var driveX = P.c, driveY = 0;

    // Wheel: outer circle minus N slots minus N cutout circles
    var wheel = new paper.Path.Circle(new Pt(wheelX, wheelY), P.b);
    for (var i = 0; i < P.n; i++) {
      var deg = i * (360 / P.n);

      // Slot (rounded rect at 0 deg, then rotated)
      var slot = new paper.Path.Rectangle({
        point: new Pt(wheelX + P.b - P.s - P.w/2, wheelY - P.w/2),
        size: new paper.Size(P.s + 2 * P.w, P.w),
        radius: P.w / 2
      });
      slot.rotate(deg, new Pt(wheelX, wheelY));
      var next = wheel.subtract(slot);
      wheel.remove(); slot.remove();
      wheel = next;

      // Stop-disc cutout circle
      var cutRad = (deg + 180 / P.n) * PI / 180;
      var cx = wheelX + P.c * Math.cos(cutRad);
      var cy = wheelY + P.c * Math.sin(cutRad);
      var cutout = new paper.Path.Circle(new Pt(cx, cy), P.y);
      next = wheel.subtract(cutout);
      wheel.remove(); cutout.remove();
      wheel = next;
    }

    // Lock disc: concentric with drive wheel, clearance arc per classic geometry (z-v triangle)
    var lockDiscPath = buildLockDiscPath(driveX, driveY, P.y, driveX - P.z, driveY - P.v, P.v);

    var result = {
      wheelPath: wheel.pathData,
      lockDiscPath: lockDiscPath,
      driveX: driveX, driveY: driveY,
      wheelX: wheelX, wheelY: wheelY,
      driveRadius: P.a + P.p,
      pinRadius: P.p / 2,
      pinStartDeg: (PI - Math.atan(P.b / P.a)) * 180 / PI * -1
    };

    wheel.remove();
    return result;
  }

  // ---- Renderer (no Paper.js dependency) ----

  var NS = 'http://www.w3.org/2000/svg';
  function el(tag, attrs, parent) {
    var e = document.createElementNS(NS, tag);
    for (var k in attrs) e.setAttribute(k, attrs[k]);
    if (parent) parent.appendChild(e);
    return e;
  }

  function rotPt(x, y, cx, cy, deg) {
    var r = deg * PI / 180;
    var dx = x - cx, dy = y - cy;
    return { x: cx + dx*Math.cos(r) - dy*Math.sin(r), y: cy + dx*Math.sin(r) + dy*Math.cos(r) };
  }

  // Anchor marker: two perpendicular strokes forming an L with the corner at (cx, cy)
  function anchorPath(cx, cy, size) {
    return 'M ' + (cx - size) + ' ' + cy + ' L ' + cx + ' ' + cy + ' L ' + cx + ' ' + (cy + size);
  }

  function render() {
    var P = calc();
    updateDisplayValues(P);
    if (!cachedShapes) cachedShapes = generateShapes(P);
    var S = cachedShapes;

    while (svg.firstChild) svg.removeChild(svg.firstChild);

    // viewBox
    var minx = S.wheelX - 1.1 * P.b;
    var miny = S.wheelY - 1.1 * Math.max(P.a, P.b);
    var vw = P.c + 1.1 * S.driveRadius + 1.1 * P.b;
    var vh = Math.max(P.a, P.b) * 2 * 1.1;
    svg.setAttribute('viewBox', minx + ' ' + miny + ' ' + vw + ' ' + vh);

    // Pin position for wheel rotation tracking
    var pinRad = (S.pinStartDeg + spinAngle) * PI / 180;
    var pinX = S.driveX + P.a * Math.cos(pinRad);
    var pinY = S.driveY + P.a * Math.sin(pinRad);
    var pinDist2 = dist(S.wheelX, S.wheelY, pinX, pinY);
    var wheelRot = pinDist2 <= P.b
      ? Math.atan2(pinY - S.wheelY, pinX - S.wheelX) * 180 / PI
      : (360 / P.n) / 2;

    // Inject shape CSS into SVG
    var styleEl = el('style', {}, svg);
    styleEl.textContent = shapeCss.value;

    var anchorSize = P.p;

    // Drive assembly (rotated group)
    var driveG = el('g', {transform: 'rotate(' + spinAngle + ' ' + S.driveX + ' ' + S.driveY + ')'}, svg);
    el('circle', {cx: S.driveX, cy: S.driveY, r: S.driveRadius, class: 'drive_wheel'}, driveG);
    el('path', {d: S.lockDiscPath, class: 'lock_disc'}, driveG);
    el('circle', {
      cx: S.driveX + P.a, cy: S.driveY, r: S.pinRadius, class: 'drive_pin',
      transform: 'rotate(' + S.pinStartDeg + ' ' + S.driveX + ' ' + S.driveY + ')'
    }, driveG);
    el('path', {d: anchorPath(S.driveX, S.driveY, anchorSize), class: 'anchor'}, driveG);

    // Wheel (rotated group)
    var wheelG = el('g', {transform: 'rotate(' + wheelRot + ' ' + S.wheelX + ' ' + S.wheelY + ')'}, svg);
    el('path', {d: S.wheelPath, class: 'geneva_wheel'}, wheelG);
    el('path', {d: anchorPath(S.wheelX, S.wheelY, anchorSize), class: 'anchor'}, wheelG);

    // Dimensions
    if (dimsCheck.checked) {
      var dimG = el('g', {}, svg);
      el('rect', {x: -100*P.b, y: -100*P.b, width: 200*P.b, height: 200*P.b, fill: 'white', 'fill-opacity': 0.4}, dimG);

      var p1 = {x: S.wheelX, y: S.wheelY};
      var p2 = {x: S.driveX, y: S.driveY};
      var p3 = {
        x: S.wheelX + P.b * Math.cos(PI / P.n),
        y: S.wheelY - P.b * Math.sin(PI / P.n)
      };
      var vz1 = {x: S.driveX, y: S.driveY};
      var vz2 = {x: S.driveX - P.z, y: S.driveY};
      var vz3 = {x: S.driveX - P.z, y: S.driveY - P.v};
      var sw = S.pinRadius / 2;

      el('path', {
        d: 'M ' + vz1.x + ' ' + vz1.y + ' L ' + vz2.x + ' ' + vz2.y + ' L ' + vz3.x + ' ' + vz3.y + ' Z',
        fill: 'none', stroke: 'gray', 'stroke-width': sw
      }, dimG);
      el('path', {
        d: 'M ' + p1.x + ' ' + p1.y + ' L ' + p2.x + ' ' + p2.y + ' L ' + p3.x + ' ' + p3.y + ' Z',
        fill: 'none', stroke: 'white', 'stroke-width': sw
      }, dimG);

      drawDimension(dimG, p1, p2, 'c', P.b, S.pinRadius);
      drawDimension(dimG, p2, p3, 'a', S.driveRadius, S.pinRadius);
      drawDimension(dimG, p3, p1, 'b', P.b / 2, S.pinRadius);
    }
  }

  function drawDimension(parent, from, to, text, leader, pinR) {
    var d = dist(from.x, from.y, to.x, to.y);
    var angle = Math.atan2(to.y - from.y, to.x - from.x) * 180 / PI;
    var lw = pinR / 4;
    var fs = pinR * 1.5;

    var g = el('g', {transform: 'translate(' + from.x + ',' + from.y + ') rotate(' + angle + ')'}, parent);
    el('line', {x1:0, y1:0, x2:0, y2: leader*1.02, stroke:'black', 'stroke-width': lw}, g);
    el('line', {x1:d, y1:0, x2:d, y2: leader*1.02, stroke:'black', 'stroke-width': lw}, g);
    el('line', {x1:0, y1:leader, x2:d, y2:leader, stroke:'black', 'stroke-width': lw}, g);

    var t = el('text', {
      x: d/2, y: leader,
      transform: 'rotate(' + (-angle) + ' ' + (d/2) + ' ' + leader + ')',
      'font-family': 'Verdana', 'text-anchor': 'middle', 'dominant-baseline': 'middle',
      'font-size': fs, fill: 'black'
    }, g);
    t.textContent = text;
  }

  // ---- Export: shapes in canonical pose, wheel rotations applied via <g transform> ----
  //
  // Static export: standalone SVG document (XML declaration + <svg>).
  // Animated export: HTML snippet (<svg> + <script>) — paste into any page.
  // Embed script comes from the #embedTpl template tag, with __CFG__ substituted at copy time.

  function buildExport(opts) {
    opts = opts || {};
    var P = calc();
    if (!cachedShapes) cachedShapes = generateShapes(P);
    var S = cachedShapes;

    var minx = S.wheelX - 1.1 * P.b;
    var miny = S.wheelY - 1.1 * Math.max(P.a, P.b);
    var vw = P.c + 1.1 * S.driveRadius + 1.1 * P.b;
    var vh = Math.max(P.a, P.b) * 2 * 1.1;
    var rest = (360 / P.n) / 2;

    var startSpin, startWheelRot;
    if (opts.animate) {
      startSpin = 0;
      startWheelRot = rest;
    } else {
      var pinRad = (S.pinStartDeg + spinAngle) * PI / 180;
      var pinX = S.driveX + P.a * Math.cos(pinRad);
      var pinY = S.driveY + P.a * Math.sin(pinRad);
      var pinDist2 = dist(S.wheelX, S.wheelY, pinX, pinY);
      startSpin = spinAngle;
      startWheelRot = pinDist2 <= P.b
        ? Math.atan2(pinY - S.wheelY, pinX - S.wheelX) * 180 / PI
        : rest;
    }

    var anchorSize = P.p;
    var driveAnchor = anchorPath(S.driveX, S.driveY, anchorSize);
    var wheelAnchor = anchorPath(S.wheelX, S.wheelY, anchorSize);

    var svg = '';
    svg += '<svg xmlns="http://www.w3.org/2000/svg" width="500" height="350" ';
    svg += 'viewBox="' + minx + ' ' + miny + ' ' + vw + ' ' + vh + '" style="background:#fcfff5">\n';
    svg += '<style>\n' + shapeCss.value + '\n</style>\n';
    svg += '<g class="drive_group" transform="rotate(' + startSpin + ' ' + S.driveX + ' ' + S.driveY + ')">\n';
    svg += '  <circle cx="'+S.driveX+'" cy="'+S.driveY+'" r="'+S.driveRadius+'" class="drive_wheel"/>\n';
    svg += '  <path d="'+S.lockDiscPath+'" class="lock_disc"/>\n';
    svg += '  <circle cx="'+(S.driveX + P.a)+'" cy="'+S.driveY+'" r="'+S.pinRadius+'" class="drive_pin" transform="rotate(' + S.pinStartDeg + ' ' + S.driveX + ' ' + S.driveY + ')"/>\n';
    svg += '  <path d="'+driveAnchor+'" class="anchor"/>\n';
    svg += '</g>\n';
    svg += '<g class="wheel_group" transform="rotate(' + startWheelRot + ' ' + S.wheelX + ' ' + S.wheelY + ')">\n';
    svg += '  <path d="'+S.wheelPath+'" class="geneva_wheel"/>\n';
    svg += '  <path d="'+wheelAnchor+'" class="anchor"/>\n';
    svg += '</g>\n';
    svg += '</svg>';

    if (!opts.animate) return '<?xml version="1.0" encoding="UTF-8"?>\n' + svg;

    var cfg = {
      dps: opts.speed,
      a: P.a, b2: P.b * P.b,
      dx: S.driveX, dy: S.driveY,
      wx: S.wheelX, wy: S.wheelY,
      psd: S.pinStartDeg,
      rest: rest
    };
    var tpl = document.getElementById('embedTpl').textContent;
    var script = tpl.replace('__CFG__', JSON.stringify(cfg));
    // \/ escaping prevents the HTML parser from closing the enclosing <script> tag here
    return svg + '\n<script>' + script + '<\/script>\n';
  }

  // ---- Event wiring ----

  function onInputChange() {
    cachedShapes = null; // invalidate — will regenerate on next render
    render();
  }

  [nInput, pInput, tInput, aInput, bInput].forEach(function(el) {
    el.addEventListener('input', onInputChange);
    el.addEventListener('change', onInputChange);
  });
  primaryRadios.forEach(function(r) {
    r.addEventListener('change', function() {
      updateInputVisibility();
      onInputChange();
    });
  });
  dimsCheck.addEventListener('change', render);
  shapeCss.addEventListener('input', render);

  // Animation — only updates transforms, shapes stay cached
  animateCheck.addEventListener('change', function() {
    if (animateCheck.checked) {
      lastTime = performance.now();
      animFrame = requestAnimationFrame(animate);
    } else if (animFrame) {
      cancelAnimationFrame(animFrame);
      animFrame = null;
    }
  });

  function animate(now) {
    var dt = now - lastTime;
    lastTime = now;
    spinAngle = (spinAngle + dt * 0.05) % 360;
    render();
    animFrame = requestAnimationFrame(animate);
  }

  // Copy SVG to clipboard
  var copyStatus = document.getElementById('copyStatus');
  var speedInput = document.getElementById('speed_input');

  function copyToClipboard(source) {
    navigator.clipboard.writeText(source).then(function() {
      copyStatus.textContent = 'Copied';
    }, function(err) {
      copyStatus.textContent = 'Failed: ' + err.message;
    });
    setTimeout(function() { copyStatus.textContent = ''; }, 2000);
  }

  document.getElementById('copyBtn').addEventListener('click', function() {
    copyToClipboard(buildExport());
  });
  document.getElementById('copyAnimBtn').addEventListener('click', function() {
    var speed = parseFloat(speedInput.value) || 0;
    copyToClipboard(buildExport({animate: true, speed: speed}));
  });

  // Initial render
  updateInputVisibility();
  render();
})();
</script>

</body>
</html>
